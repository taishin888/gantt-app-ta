name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'
      - 'index.html'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 全履歴取得（gh-pagesブランチ操作に必要）

      - name: Debug
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        run: |
          echo "=== root ==="
          ls -la
          echo "=== scripts ==="
          ls -la .github/scripts/
          echo "=== TEAMS_WEBHOOK ==="
          if [ -z "$TEAMS_WEBHOOK" ]; then echo "NOT SET"; else echo "SET (len=${#TEAMS_WEBHOOK})"; fi

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/notify.js

      - name: Build read-only site
        run: node .github/scripts/build-readonly.js

      - name: Verify build output
        run: |
          echo "=== _site contents ==="
          ls -lh _site/
          echo "=== viewer.html READONLY ==="
          grep 'const READONLY' _site/viewer.html
          echo "=== index.html READONLY ==="
          grep 'const READONLY' _site/index.html

      # ── gh-pages ブランチに直接 git push ──
      - name: Deploy to gh-pages branch
        run: |
          cd _site

          git init
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Deploy: $(date '+%Y-%m-%d %H:%M:%S JST' --date='TZ=\"Asia/Tokyo\" now')"

          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            HEAD:gh-pages

          echo "=== Deploy complete ==="
          echo "URL: https://$(echo '${{ github.repository }}' | cut -d'/' -f1).github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)/viewer.html"
