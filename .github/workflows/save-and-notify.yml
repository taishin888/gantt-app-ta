name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write notifier script
        run: |
          cat > /tmp/notify.js << 'EOF'
          const fs    = require('fs');
          const https = require('https');

          const data   = JSON.parse(fs.readFileSync('data/tasks.json', 'utf8'));
          const now    = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
          const commit = (process.env.GITHUB_SHA || 'unknown').slice(0, 7);
          const repo   = process.env.GITHUB_REPOSITORY || '';
          const pages  = repo ? 'https://' + repo.split('/')[0] + '.github.io/' + repo.split('/')[1] : '';

          const total = data.tasks.length;
          const doing = data.tasks.filter(t => t.status === 'doing').length;
          const done  = data.tasks.filter(t => t.status === 'done').length;
          const todo  = data.tasks.filter(t => t.status === 'todo').length;

          const memberMap = {};
          (data.members || []).forEach(m => { memberMap[m.name] = m; });

          const mentionEntities = [];
          const mentionRows     = [];

          data.tasks
            .filter(t => t.status !== 'done')
            .forEach(task => {
              const member = memberMap[task.owner] || {};
              const email  = member.email || null;
              const name   = task.owner  || '未設定';

              if (email) {
                mentionEntities.push({
                  type: 'mention',
                  text: '<at>' + name + '</at>',
                  mentioned: { id: email, name: name }
                });
                mentionRows.push({
                  type: 'TextBlock',
                  text: '<at>' + name + '</at>\u3000' + task.name + '\u3000\u671f\u65e5: ' + task.end,
                  wrap: true,
                  spacing: 'Small'
                });
              } else {
                mentionRows.push({
                  type: 'TextBlock',
                  text: '\ud83d\udc64 ' + name + '\u3000' + task.name + '\u3000\u671f\u65e5: ' + task.end,
                  wrap: true,
                  spacing: 'Small'
                });
              }
            });

          const cardBody = [
            { type: 'TextBlock', text: '\ud83d\udcca \u30ac\u30f3\u30c8\u30c1\u30e3\u30fc\u30c8\u304c\u66f4\u65b0\u3055\u308c\u307e\u3057\u305f', weight: 'Bolder', size: 'Medium', color: 'Accent' },
            { type: 'FactSet', facts: [
                { title: '\u66f4\u65b0\u65e5\u6642', value: now },
                { title: '\u30b3\u30df\u30c3\u30c8', value: commit },
                { title: '\u7dcf\u30bf\u30b9\u30af\u6570', value: String(total) },
                { title: '\u9032\u884c\u4e2d',   value: String(doing) },
                { title: '\u5b8c\u4e86\u6e08\u307f', value: String(done)  },
                { title: '\u672a\u7740\u624b',   value: String(todo)  }
            ]},
            { type: 'TextBlock', text: '\u62c5\u5f53\u30bf\u30b9\u30af\u4e00\u89a7', weight: 'Bolder', spacing: 'Medium', separator: true }
          ].concat(mentionRows);

          const card = {
            type: 'AdaptiveCard',
            version: '1.4',
            msteams: { entities: mentionEntities },
            body: cardBody,
            actions: pages ? [{ type: 'Action.OpenUrl', title: '\u30ac\u30f3\u30c8\u30c1\u30e3\u30fc\u30c8\u3092\u958b\u304f', url: pages }] : []
          };

          const payload = JSON.stringify({
            type: 'message',
            attachments: [{ contentType: 'application/vnd.microsoft.card.adaptive', content: card }]
          });

          const webhook = process.env.TEAMS_WEBHOOK;
          if (!webhook) { console.log('TEAMS_WEBHOOK not set. Skipping.'); process.exit(0); }

          const u = new URL(webhook);
          const req = https.request({
            hostname: u.hostname, path: u.pathname + u.search, method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
          }, res => {
            let raw = '';
            res.on('data', d => raw += d);
            res.on('end', () => {
              console.log('Teams HTTP status:', res.statusCode);
              if (res.statusCode >= 300) { console.error('Response:', raw); process.exit(1); }
            });
          });
          req.on('error', e => { console.error('Error:', e.message); process.exit(1); });
          req.write(payload);
          req.end();
          EOF

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node /tmp/notify.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,node_modules'
