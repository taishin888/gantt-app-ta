name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'
      - 'index.html'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug file structure
        run: |
          echo "=== root ==="
          ls -la
          echo "=== .github/scripts ==="
          ls -la .github/scripts/
          echo "=== data/tasks.json (head 10) ==="
          head -10 data/tasks.json
          echo "=== TEAMS_WEBHOOK set? ==="
          if [ -z "$TEAMS_WEBHOOK" ]; then echo "NOT SET"; else echo "SET (length=${#TEAMS_WEBHOOK})"; fi
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/notify.js

      - name: Build read-only site
        run: node .github/scripts/build-readonly.js

      - name: Debug generated site
        run: |
          ls -la _site/
          grep 'const READONLY' _site/viewer.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
