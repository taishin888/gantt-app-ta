name: Daily Deadline Reminder

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run reminder
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/remind.js
