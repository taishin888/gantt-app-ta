name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  notify-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── タスクデータを読んでTeams通知メッセージを生成 ──
      - name: Build Teams notification
        id: build-msg
        run: |
          node -e "
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('data/tasks.json', 'utf8'));

          const now = new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' });
          const commit = process.env.GITHUB_SHA.slice(0,7);
          const repo   = process.env.GITHUB_REPOSITORY;
          const pages  = 'https://' + repo.split('/')[0] + '.github.io/' + repo.split('/')[1];

          const doing = data.tasks.filter(t => t.status === 'doing').length;
          const done  = data.tasks.filter(t => t.status === 'done').length;
          const total = data.tasks.length;

          const msg = {
            '@type': 'MessageCard',
            '@context': 'http://schema.org/extensions',
            summary: 'ガントチャート更新',
            themeColor: '0076D7',
            title: '📊 ガントチャートが更新されました',
            sections: [{
              activityTitle: '更新日時: ' + now,
              activitySubtitle: 'コミット: ' + commit,
              facts: [
                { name: '総タスク数', value: String(total) },
                { name: '進行中',     value: String(doing) },
                { name: '完了済み',   value: String(done)  },
              ]
            }],
            potentialAction: [{
              '@type': 'OpenUri',
              name: 'ガントチャートを開く',
              targets: [{ os: 'default', uri: pages }]
            }]
          };
          fs.writeFileSync('/tmp/teams-msg.json', JSON.stringify(msg));
          console.log('Message built.');
          "
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      # ── Teams Webhook 送信 ──
      - name: Send Teams notification
        run: |
          curl -sf -X POST "${{ secrets.TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d @/tmp/teams-msg.json \
            && echo "Teams notification sent." \
            || echo "Teams webhook skipped (secret not set)."

      # ── 閲覧専用HTMLを生成（ガントチャートの静的スナップショット） ──
      - name: Generate read-only HTML export
        run: |
          node -e "
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const data = fs.readFileSync('data/tasks.json', 'utf8');

          // データをインライン埋め込み、読み取り専用フラグをセット
          const injected = html
            .replace(
              'let DATA = {',
              'window.READONLY = true; let DATA = ' + data + '; let DATA_BAK = {'
            )
            .replace(
              '</title>',
              '</title><meta name=\"robots\" content=\"noindex\">'
            );

          fs.writeFileSync('gantt-export.html', injected);
          console.log('Export generated.');
          "

      # ── Teams にエクスポートHTMLを添付送信 ──
      # (Teamsの場合、ファイル添付はGraph API経由が必要なため
      #  ここではGitHub Pagesリンクを通知する簡易版)
      - name: Notify export ready
        run: |
          PAGES_URL="https://$(echo '${{ github.repository }}' | cut -d'/' -f1).github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)/gantt-export.html"
          MSG="{\"text\":\"📎 **最新のガントチャートエクスポート**\\n\\n閲覧専用HTMLはこちら: ${PAGES_URL}\"}"
          curl -sf -X POST "${{ secrets.TEAMS_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$MSG" \
            || echo "Skipped."

      # ── GitHub Pages にデプロイ ──
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,node_modules'
