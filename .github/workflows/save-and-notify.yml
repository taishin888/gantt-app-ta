name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'
      - 'index.html'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug info
        env:
          TEAMS_WEBHOOK: ${{ secrets.TEAMS_WEBHOOK }}
        run: |
          echo "=== Repository ==="
          echo "Repo: ${{ github.repository }}"
          echo "Branch: ${{ github.ref }}"
          ls -la
          echo "=== scripts ==="
          ls -la .github/scripts/
          echo "=== data ==="
          ls -la data/
          echo "=== TEAMS_WEBHOOK ==="
          if [ -z "$TEAMS_WEBHOOK" ]; then echo "NOT SET"; else echo "SET (len=${#TEAMS_WEBHOOK})"; fi

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/notify.js

      - name: Build read-only viewer
        run: node .github/scripts/build-readonly.js

      - name: Verify build
        run: |
          echo "=== _site/ ==="
          ls -lh _site/
          echo "=== READONLY check ==="
          grep 'const READONLY' _site/viewer.html
          echo "=== viewer.html size ==="
          wc -c _site/viewer.html

      - name: Deploy viewer to docs/ folder on main branch
        run: |
          # docs/ フォルダに viewer.html と index.html をコピー
          mkdir -p docs/data

          cp _site/viewer.html docs/viewer.html
          cp _site/index.html  docs/index.html
          cp data/tasks.json   docs/data/tasks.json

          echo "=== docs/ contents ==="
          ls -lh docs/

          # git設定
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # docs/フォルダの変更をコミット
          git add docs/
          git diff --staged --stat

          # 変更があればコミット＆プッシュ
          if git diff --staged --quiet; then
            echo "No changes in docs/ — skipping commit"
          else
            git commit -m "Deploy viewer: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "=== Pushed docs/ to main ==="
          fi

          echo "=== Viewer URL ==="
          echo "https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)/viewer.html"
