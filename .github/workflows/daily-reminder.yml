name: Daily Deadline Reminder

on:
  schedule:
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write reminder script
        run: |
          cat > /tmp/remind.js << 'EOF'
          const fs    = require('fs');
          const https = require('https');

          const data = JSON.parse(fs.readFileSync('data/tasks.json', 'utf8'));
          const now  = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Tokyo' }));
          now.setHours(0, 0, 0, 0);

          const settings    = data.settings || {};
          const remindDaysA = parseInt(settings.r1) || 3;
          const remindDaysB = parseInt(settings.r2) || 1;

          const memberMap = {};
          (data.members || []).forEach(m => { memberMap[m.name] = m; });

          function getTasksDueIn(days) {
            return data.tasks.filter(t => {
              if (t.status === 'done') return false;
              const end = new Date(t.end + 'T00:00:00');
              return Math.round((end - now) / 86400000) === days;
            });
          }

          const tasks3     = getTasksDueIn(remindDaysA);
          const tasks1     = getTasksDueIn(remindDaysB);
          const tasksToday = getTasksDueIn(0);

          if (!tasks3.length && !tasks1.length && !tasksToday.length) {
            console.log('No reminders today. Skipping.');
            process.exit(0);
          }

          const mentionEntities = [];
          const usedEmails      = new Set();

          function buildRows(tasks, icon, label) {
            if (!tasks.length) return [];
            const rows = [];
            rows.push({ type: 'TextBlock', text: icon + ' **' + label + '**', weight: 'Bolder', spacing: 'Medium', separator: true });
            tasks.forEach(task => {
              const member = memberMap[task.owner] || {};
              const email  = member.email || null;
              const name   = task.owner  || '\u672a\u8a2d\u5b9a';
              if (email && !usedEmails.has(email)) {
                usedEmails.add(email);
                mentionEntities.push({ type: 'mention', text: '<at>' + name + '</at>', mentioned: { id: email, name: name } });
              }
              const mention = email ? '<at>' + name + '</at>' : '\ud83d\udc64 ' + name;
              rows.push({ type: 'TextBlock', text: mention + '\u3000' + task.name + '\u3000\u671f\u65e5: ' + task.end, wrap: true, spacing: 'Small' });
            });
            return rows;
          }

          const bodyRows = [
            { type: 'TextBlock', text: '\ud83d\udcc5 \u30bf\u30b9\u30af\u671f\u9650\u30ea\u30de\u30a4\u30f3\u30c0\u30fc \u2014 ' + now.toLocaleDateString('ja-JP'), weight: 'Bolder', size: 'Medium', color: 'Accent' }
          ]
            .concat(buildRows(tasksToday, '\ud83d\udd34', '\u672c\u65e5\u304c\u671f\u9650'))
            .concat(buildRows(tasks1,     '\ud83d\udea8', '\u660e\u65e5\u304c\u671f\u9650\uff08\u3042\u3068' + remindDaysB + '\u65e5\uff09'))
            .concat(buildRows(tasks3,     '\u26a0\ufe0f',  '\u671f\u9650\u307e\u3067' + remindDaysA + '\u65e5'));

          const repo  = process.env.GITHUB_REPOSITORY || '';
          const pages = repo ? 'https://' + repo.split('/')[0] + '.github.io/' + repo.split('/')[1] : '';

          const card = {
            type: 'AdaptiveCard', version: '1.4',
            msteams: { entities: mentionEntities },
            body: bodyRows,
            actions: pages ? [{ type: 'Action.OpenUrl', title: '\u30ac\u30f3\u30c8\u30c1\u30e3\u30fc\u30c8\u3092\u78ba\u8a8d', url: pages }] : []
          };

          const payload = JSON.stringify({
            type: 'message',
            attachments: [{ contentType: 'application/vnd.microsoft.card.adaptive', content: card }]
          });

          const webhook = process.env.TEAMS_WEBHOOK;
          if (!webhook) { console.log('TEAMS_WEBHOOK not set. Skipping.'); process.exit(0); }

          const u = new URL(webhook);
          const req = https.request({
            hostname: u.hostname, path: u.pathname + u.search, method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
          }, res => {
            let raw = '';
            res.on('data', d => raw += d);
            res.on('end', () => {
              console.log('Teams HTTP status:', res.statusCode);
              if (res.statusCode >= 300) { console.error('Response:', raw); process.exit(1); }
            });
          });
          req.on('error', e => { console.error('Error:', e.message); process.exit(1); });
          req.write(payload);
          req.end();
          EOF

      - name: Run reminder
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node /tmp/remind.js
