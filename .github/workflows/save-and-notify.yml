name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'
      - 'index.html'
      - '.github/scripts/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug info
        env:
          TEAMS_WEBHOOK:    ${{ secrets.TEAMS_WEBHOOK }}
          GANTT_READ_TOKEN: ${{ secrets.GANTT_READ_TOKEN }}
        run: |
          echo "=== Repository: ${{ github.repository }} ==="
          ls -la
          ls -la .github/scripts/ || echo "no scripts dir"
          ls -la data/ || echo "no data dir"
          if [ -z "$TEAMS_WEBHOOK" ];    then echo "TEAMS_WEBHOOK: NOT SET";    else echo "TEAMS_WEBHOOK: SET (len=${#TEAMS_WEBHOOK})"; fi
          if [ -z "$GANTT_READ_TOKEN" ]; then echo "GANTT_READ_TOKEN: NOT SET"; else echo "GANTT_READ_TOKEN: SET (len=${#GANTT_READ_TOKEN})"; fi

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/notify.js

      - name: Build viewer and editor
        env:
          GITHUB_REPOSITORY:    ${{ github.repository }}
          GITHUB_DEPLOY_BRANCH: main
          GANTT_READ_TOKEN:     ${{ secrets.GANTT_READ_TOKEN }}
        run: node .github/scripts/build-readonly.js

      - name: Verify build output
        run: |
          echo "=== _site/ ==="
          ls -lh _site/
          echo "=== viewer.html: READONLY ==="
          grep 'const READONLY' _site/viewer.html
          echo "=== index.html: READONLY ==="
          grep 'const READONLY' _site/index.html
          echo "=== index.html: GITHUB_REPO ==="
          grep 'GITHUB_REPO' _site/index.html | head -3

      - name: Deploy to docs/ folder
        run: |
          mkdir -p docs/data

          cp _site/viewer.html docs/viewer.html
          cp _site/index.html  docs/index.html
          cp data/tasks.json   docs/data/tasks.json

          # members.xlsxがあればコピー
          if [ -f data/members.xlsx ]; then
            cp data/members.xlsx docs/data/members.xlsx
            echo "members.xlsx copied"
          fi

          echo "=== docs/ ==="
          ls -lh docs/
          ls -lh docs/data/

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --stat

          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Deploy: $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
            echo "=== Deploy complete ==="
          fi

          echo "Viewer URL: https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)/viewer.html"
          echo "Editor URL: https://${{ github.repository_owner }}.github.io/$(echo '${{ github.repository }}' | cut -d'/' -f2)/index.html"
