name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Teams に通知 ──
      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/notify.js

      # ── 閲覧専用HTMLをビルド（データ埋め込み済み） ──
      - name: Build read-only site
        run: node .github/scripts/build-readonly.js

      # ── GitHub Pages にデプロイ ──
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
