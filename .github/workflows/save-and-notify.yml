name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show file structure (debug)
        run: |
          echo "=== Repository root ==="
          ls -la
          echo "=== .github/scripts ==="
          ls -la .github/scripts/
          echo "=== data/ ==="
          ls -la data/
          echo "=== data/tasks.json (first 30 lines) ==="
          head -30 data/tasks.json

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node .github/scripts/notify.js

      - name: Build read-only site
        run: node .github/scripts/build-readonly.js

      - name: Show generated site (debug)
        run: |
          echo "=== _site/ ==="
          ls -la _site/
          echo "=== _site/index.html size ==="
          wc -c _site/index.html
          echo "=== READONLY flag check ==="
          grep 'READONLY' _site/index.html | head -3
          echo "=== DATA check ==="
          grep -o '"name":"[^"]*"' _site/index.html | head -8

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
