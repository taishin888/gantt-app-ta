name: Save & Notify Teams

on:
  push:
    branches:
      - main
    paths:
      - 'data/tasks.json'
      - 'index.html'
      - '.github/scripts/**'
  workflow_dispatch:   # ← 手動実行ボタンを追加

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  notify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show file structure (debug)
        run: |
          echo "=== Repository root ==="
          ls -la
          echo "=== .github/scripts ==="
          ls -la .github/scripts/
          echo "=== data/tasks.json (first 10 lines) ==="
          head -10 data/tasks.json

      - name: Send Teams notification
        env:
          TEAMS_WEBHOOK:     ${{ secrets.TEAMS_WEBHOOK }}
          GITHUB_SHA:        ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        # data/tasks.json 変更時のみ通知（index.html変更では通知しない）
        run: |
          if git diff --name-only HEAD~1 HEAD 2>/dev/null | grep -q 'data/tasks.json' || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            node .github/scripts/notify.js
          else
            echo "index.html or scripts updated — skipping Teams notification"
          fi

      - name: Build read-only site
        run: node .github/scripts/build-readonly.js

      - name: Show generated site (debug)
        run: |
          echo "=== _site/ ==="
          ls -la _site/
          echo "=== viewer.html READONLY check ==="
          grep 'const READONLY' _site/viewer.html
          echo "=== index.html READONLY check ==="
          grep 'const READONLY' _site/index.html
          echo "=== viewer.html size ==="
          wc -c _site/viewer.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: false
